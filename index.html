<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор калорий</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Калькулятор калорий</h1>
    <p class="subtitle">Рассчитайте суточную норму калорий по формуле Миффлина — Сан Жеора</p>

    <form id="calc-form" class="form" novalidate>
      <div class="field">
        <span class="label">Пол</span>
        <div class="radio-group">
          <label class="radio">
            <input type="radio" name="gender" value="male" checked>
            <span>Мужчина</span>
          </label>
          <label class="radio">
            <input type="radio" name="gender" value="female">
            <span>Женщина</span>
          </label>
        </div>
      </div>

      <div class="field">
        <label class="label" for="age">Возраст, лет</label>
        <input type="number" id="age" name="age" min="1" max="120" step="1" placeholder="30" required>
      </div>

      <div class="field">
        <label class="label" for="weight">Вес, кг</label>
        <input type="number" id="weight" name="weight" min="20" max="400" step="0.1" placeholder="70" required>
      </div>

      <div class="field">
        <label class="label" for="height">Рост, см</label>
        <input type="number" id="height" name="height" min="80" max="250" step="0.1" placeholder="175" required>
      </div>

      <div class="field">
        <label class="label" for="activity">Уровень активности</label>
        <select id="activity" name="activity">
          <option value="1.2">Минимальный (сидячий образ жизни)</option>
          <option value="1.375">Низкий (лёгкие тренировки 1–3 раза в неделю)</option>
          <option value="1.55" selected>Средний (тренировки 3–5 раз в неделю)</option>
          <option value="1.725">Высокий (тренировки 6–7 раз в неделю)</option>
          <option value="1.9">Очень высокий (физическая работа, спорт 2 раза в день)</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="goal">Цель</label>
        <select id="goal" name="goal">
          <option value="lose">Похудение (дефицит 15%)</option>
          <option value="maintain" selected>Поддержание веса</option>
          <option value="gain">Набор массы (профицит 15%)</option>
        </select>
      </div>

      <button type="submit" class="btn">Рассчитать</button>
    </form>

    <p id="error" class="error" hidden></p>

    <section id="result" class="result" hidden>
      <div class="result-main">
        <span class="result-label">Ваша суточная норма</span>
        <span class="result-value"><span id="target-calories">0</span> ккал</span>
      </div>
      <p class="result-bmr">Базовый обмен веществ (BMR): <strong id="bmr-value">0</strong> ккал</p>
      <p class="result-tdee">Расход с учётом активности (TDEE): <strong id="tdee-value">0</strong> ккал</p>

      <div class="macros">
        <h2>Рекомендуемые макронутриенты</h2>
        <ul class="macro-list">
          <li><span class="macro-name">Белки</span><span class="macro-val"><strong id="protein">0</strong> г</span></li>
          <li><span class="macro-name">Жиры</span><span class="macro-val"><strong id="fat">0</strong> г</span></li>
          <li><span class="macro-name">Углеводы</span><span class="macro-val"><strong id="carbs">0</strong> г</span></li>
        </ul>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
